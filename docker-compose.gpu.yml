services:
  nitk-advisor-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: nitk-advisor-gpu:latest
    container_name: nitk-advisor-api-gpu
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-exp}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/e5-base-v2}
      - CROSS_ENCODER_MODEL=${CROSS_ENCODER_MODEL:-BAAI/bge-reranker-large}
      - TOP_K_VECTOR=${TOP_K_VECTOR:-50}
      - TOP_K_BM25=${TOP_K_BM25:-50}
      - TOP_K_HYBRID=${TOP_K_HYBRID:-100}
      - TOP_K_RERANK=${TOP_K_RERANK:-20}
      - FINAL_TOP_K=${FINAL_TOP_K:-10}
      - HYBRID_ALPHA=${HYBRID_ALPHA:-0.3}
      - CUDA_VISIBLE_DEVICES=0
    
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./data/pdfs:/app/data/pdfs
    
    restart: unless-stopped
    
    # GPU configuration
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    runtime: nvidia
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    
    networks:
      - nitk-network

networks:
  nitk-network:
    driver: bridge
