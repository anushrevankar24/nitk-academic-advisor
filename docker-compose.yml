services:
  # Main API service
  nitk-advisor:
    build:
      context: .
      dockerfile: Dockerfile
    image: nitk-advisor:latest
    container_name: nitk-advisor-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # Gemini API (required)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-exp}
      
      # Model Configuration
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/e5-base-v2}
      - CROSS_ENCODER_MODEL=${CROSS_ENCODER_MODEL:-BAAI/bge-reranker-large}
      
      # Retrieval Configuration
      - TOP_K_VECTOR=${TOP_K_VECTOR:-50}
      - TOP_K_BM25=${TOP_K_BM25:-50}
      - TOP_K_HYBRID=${TOP_K_HYBRID:-100}
      - TOP_K_RERANK=${TOP_K_RERANK:-20}
      - FINAL_TOP_K=${FINAL_TOP_K:-10}
      - HYBRID_ALPHA=${HYBRID_ALPHA:-0.3}
      
    volumes:
      # Mount data directory for persistence
      - ./data:/app/data
      # Mount logs directory
      - ./logs:/app/logs
      # Optional: Mount PDFs if you want to update them
      - ./data/pdfs:/app/data/pdfs
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    networks:
      - nitk-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: nitk-advisor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - nitk-advisor
    restart: unless-stopped
    networks:
      - nitk-network
    profiles:
      - production  # Only start with: docker-compose --profile production up

networks:
  nitk-network:
    driver: bridge
